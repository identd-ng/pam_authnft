name: CIFuzz
on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read

# Leak detection requires ptrace which GitHub Actions runners deny.
# Disable it so ASan does not abort before the fuzzer finishes its run.
env:
  ASAN_OPTIONS: detect_leaks=0

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang pkg-config \
            libnftables-dev libseccomp-dev libsystemd-dev libpam0g-dev libcap-dev

      - name: Build fuzz targets
        run: make fuzz

      - name: Fuzz util_is_valid_username + util_normalize_ip (60s)
        run: |
          mkdir -p fuzz/corpus/username fuzz/crashes
          ./fuzz/out/fuzz_username \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/username- \
            fuzz/corpus/username/

      - name: Fuzz validate_fragment_content (60s)
        run: |
          mkdir -p fuzz/corpus/fragment fuzz/crashes
          ./fuzz/out/fuzz_fragment \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/fragment- \
            fuzz/corpus/fragment/

      - name: Fuzz substitute_placeholders (60s)
        run: |
          mkdir -p fuzz/corpus/substitute_placeholders fuzz/crashes
          ./fuzz/out/fuzz_substitute_placeholders \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/substitute_placeholders- \
            fuzz/corpus/substitute_placeholders/

      - name: Fuzz peer_parse_diag_chunk (60s)
        run: |
          mkdir -p fuzz/corpus/netlink_diag fuzz/crashes
          ./fuzz/out/fuzz_netlink_diag \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/netlink_diag- \
            fuzz/corpus/netlink_diag/

      - name: Fuzz keyring_sanitize (60s)
        run: |
          mkdir -p fuzz/corpus/keyring_sanitize fuzz/crashes
          ./fuzz/out/fuzz_keyring_sanitize \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/keyring_sanitize- \
            fuzz/corpus/keyring_sanitize/

      - name: Fuzz corr_sanitize_copy (60s)
        run: |
          mkdir -p fuzz/corpus/correlation_capture fuzz/crashes
          ./fuzz/out/fuzz_correlation_capture \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/correlation_capture- \
            fuzz/corpus/correlation_capture/

      - name: Fuzz validate_cgroup_path (60s)
        run: |
          mkdir -p fuzz/corpus/cgroup_path fuzz/crashes
          ./fuzz/out/fuzz_cgroup_path \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/cgroup_path- \
            fuzz/corpus/cgroup_path/

      - name: Fuzz parse_socket_inode (60s)
        run: |
          mkdir -p fuzz/corpus/socket_inode fuzz/crashes
          ./fuzz/out/fuzz_socket_inode \
            -max_total_time=60 \
            -artifact_prefix=fuzz/crashes/socket_inode- \
            fuzz/corpus/socket_inode/

      - name: Upload crash artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes
          path: fuzz/crashes/
