name: build
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libnftables-dev libseccomp-dev libsystemd-dev libpam0g-dev libcap-dev
      - name: Build
        run: make CC=${{ matrix.compiler }}
      - name: Unit tests (no root)
        run: make CC=${{ matrix.compiler }} test
