name: sanitizers
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libnftables-dev libseccomp-dev libsystemd-dev libpam0g-dev libcap-dev
      - name: Build with -fsanitize=${{ matrix.sanitizer }}
        # Build-only: the test harness's seccomp sandbox + fork/exec scaffold
        # tangles with ASan's signal/leak interceptors under CI.  We run
        # sanitized tests locally against the full system; here we just prove
        # the sanitized shared object links cleanly.
        run: |
          make CFLAGS_BASE="-fPIC -Wall -Wextra -g -O1 -Iinclude -D_GNU_SOURCE \
            -fno-omit-frame-pointer -fsanitize=${{ matrix.sanitizer }}" \
            LDFLAGS_BASE="-fsanitize=${{ matrix.sanitizer }}" \
            all
