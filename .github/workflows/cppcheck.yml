name: cppcheck
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck \
            libnftables-dev libseccomp-dev libsystemd-dev libpam0g-dev libcap-dev
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability --std=c11 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=checkersReport \
            -Iinclude src/ tests/
