name: coverage
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config gcovr \
            libnftables-dev libseccomp-dev libsystemd-dev libpam0g-dev libcap-dev
      - name: Build + test with coverage
        run: |
          make CFLAGS_BASE="-fPIC -Wall -Wextra -O0 -g --coverage -Iinclude -D_GNU_SOURCE" \
            LDFLAGS_BASE="--coverage" \
            all test
      - name: Generate coverage report
        run: gcovr --xml-pretty -o coverage.xml --root .
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
